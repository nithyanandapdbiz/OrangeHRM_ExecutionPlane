name: Secret Scan

# Defence-in-depth against credential leakage (e.g. a real Jira/Zephyr token
# pasted into a committed file). Runs on every push/PR and on a weekly schedule.
# Complements GitHub's native Push Protection / Secret Scanning (enable both in
# repo Settings → Code security and analysis).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC — full-history sweep

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan entire git history, not just the tip

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  eradication:
    name: Legacy-reference eradication gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Fails the build if any legacy pre-platform reference reappears
      # (denylist: scripts/legacy-terms.js).
      - name: Domain-eradication audit
        run: node scripts/domain-eradication-audit.js
