apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "execution-plane.fullname" . }}
  labels:
    {{- include "execution-plane.labels" . | nindent 4 }}
spec:
  # Single replica is REQUIRED until TD-12 (process-global state) is resolved.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate          # avoid two pods racing on shared run state
  selector:
    matchLabels:
      {{- include "execution-plane.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "execution-plane.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ .Values.config | toYaml | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        seccompProfile:
          type: {{ .Values.securityContext.seccompProfile.type }}
      containers:
        - name: execution-plane
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            capabilities:
              {{- toYaml .Values.securityContext.capabilities | nindent 14 }}
          envFrom:
            - configMapRef:
                name: {{ include "execution-plane.fullname" . }}-config
            - secretRef:
                name: {{ .Values.existingSecret | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
